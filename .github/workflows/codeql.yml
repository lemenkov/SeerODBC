name: CodeQL

on:
  push:
    branches: [master]
    # Docs-only changes have no code for CodeQL to analyse — skip them.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSES/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSES/**'
  schedule:
    # Weekly Monday 06:17 UTC — off the hour to dodge cron spikes.
    - cron: '17 6 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            build-mode: manual
    steps:
      - uses: actions/checkout@v7

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build pkg-config libssl-dev unixodbc-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      # Manual build mode: CodeQL traces this compile to build its database, so it
      # sees the whole driver (protocol core + ODBC shim + freeoracle).
      - name: Build
        run: |
          meson setup build
          meson compile -C build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
